<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TON Paint</title>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
}

header{
width:100%;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
background:#1b1b1b;
}

canvas{
background:white;
border-radius:12px;
margin-top:20px;
touch-action:none;
}

.toolbar{
margin-top:15px;
display:flex;
gap:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}

input[type=color]{
height:45px;
}
</style>
</head>
<body>

<header>
<h2>TON Paint</h2>
<div id="ton-connect"></div>
</header>

<canvas id="paint" width="1000" height="600"></canvas>

<div class="toolbar">
<input type="color" id="color">
<input type="range" id="size" min="1" max="50" value="5">

<button id="clear">
Очистить
</button>

<button id="save">
Сохранить PNG
</button>
</div>

<script>

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
manifestUrl:
'https://romerosai.space/tonconnect-manifest.json',
buttonRootId:'ton-connect'
});

tonConnectUI.onStatusChange(wallet=>{
if(wallet){
console.log(
wallet.account.address
);
}
});

const canvas =
document.getElementById('paint');

const ctx =
canvas.getContext('2d');

let drawing=false;

canvas.addEventListener(
'mousedown',
()=>{
drawing=true;
}
);

canvas.addEventListener(
'mouseup',
()=>{
drawing=false;
ctx.beginPath();
}
);

canvas.addEventListener(
'mousemove',
draw
);

function draw(e){

if(!drawing)return;

ctx.lineWidth=
document.getElementById('size').value;

ctx.strokeStyle=
document.getElementById('color').value;

ctx.lineCap='round';

ctx.lineTo(
e.offsetX,
e.offsetY
);

ctx.stroke();

ctx.beginPath();

ctx.moveTo(
e.offsetX,
e.offsetY
);

}

document
.getElementById('clear')
.onclick=()=>{

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

};

document
.getElementById('save')
.onclick=()=>{

const link=
document.createElement('a');

link.download=
'drawing.png';

link.href=
canvas.toDataURL();

link.click();

};

</script>

</body>
</html>
